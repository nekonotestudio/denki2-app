<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>電工二種 アイコン生成</title></head>
<body style="font-family:sans-serif;padding:20px;background:#14140a;color:#fef9c3;">
<h2 style="color:#facc15;">第二種電気工事士 アイコン生成</h2>
<canvas id="c192" width="192" height="192" style="border:1px solid #4a4520;margin:8px;"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #4a4520;margin:8px;width:128px;height:128px;"></canvas>
<br>
<button onclick="dl('c192','icon-192.png')" style="margin:6px;padding:8px 16px;background:#facc15;color:#14140a;border:none;cursor:pointer;font-weight:700;">icon-192.png をダウンロード</button>
<button onclick="dl('c512','icon-512.png')" style="margin:6px;padding:8px 16px;background:#facc15;color:#14140a;border:none;cursor:pointer;font-weight:700;">icon-512.png をダウンロード</button>
<script>
function draw(id){
  const c=document.getElementById(id); const s=c.width; const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,s,s); g.addColorStop(0,'#14140a'); g.addColorStop(1,'#33330f');
  const r=s*0.18; ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(s-r,0);ctx.quadraticCurveTo(s,0,s,r);ctx.lineTo(s,s-r);ctx.quadraticCurveTo(s,s,s-r,s);ctx.lineTo(r,s);ctx.quadraticCurveTo(0,s,0,s-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.clip();
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
  // 稲妻マーク
  ctx.fillStyle='#facc15';
  ctx.beginPath();
  ctx.moveTo(s*0.56,s*0.16);
  ctx.lineTo(s*0.34,s*0.52);
  ctx.lineTo(s*0.48,s*0.52);
  ctx.lineTo(s*0.42,s*0.80);
  ctx.lineTo(s*0.66,s*0.44);
  ctx.lineTo(s*0.51,s*0.44);
  ctx.closePath();
  ctx.shadowColor='rgba(250,204,21,0.6)'; ctx.shadowBlur=s*0.08;
  ctx.fill();
  ctx.shadowBlur=0;
  // 電工二種
  ctx.fillStyle='#fef9c3'; ctx.font=`bold ${s*0.16}px 'Hiragino Kaku Gothic ProN',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('電工二種', s*0.5, s*0.9);
}
function dl(id,name){ const c=document.getElementById(id); const a=document.createElement('a'); a.download=name; a.href=c.toDataURL('image/png'); a.click(); }
draw('c192'); draw('c512');
</script>
</body>
</html>
